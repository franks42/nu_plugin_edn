name: nushell-drift

# Weekly check: has Nushell shipped a version newer than our anchor?
# If so, run the integration suite against the new Nushell:
#   - Tests pass: open a PR bumping the anchor (with -SNAPSHOT suffix
#     on plugin-release for the dev window) so a maintainer can review.
#   - Tests fail: open an issue with the failure log so a maintainer
#     knows the protocol or behaviour shifted.
#
# Manual trigger via workflow_dispatch is supported for testing.

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read current anchor and latest Nushell tag
        id: versions
        run: |
          CURRENT=$(grep -oE '\(def nushell-target[^)]+\)' nu_plugin_edn \
                    | grep -oE '"[^"]+"' \
                    | tail -1 \
                    | tr -d '"')
          LATEST=$(curl -sL https://api.github.com/repos/nushell/nushell/releases/latest \
                   | jq -r .tag_name)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST"   >> "$GITHUB_OUTPUT"
          echo "Plugin anchor: $CURRENT"
          echo "Latest Nushell: $LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "drift=no" >> "$GITHUB_OUTPUT"
          else
            echo "drift=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Up to date — exit
        if: steps.versions.outputs.drift == 'no'
        run: echo "::notice::Plugin anchor matches latest Nushell. Nothing to do."

      - name: Install babashka, clj-kondo, cljfmt
        if: steps.versions.outputs.drift == 'yes'
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          bb: 'latest'
          clj-kondo: 'latest'
          cljfmt: 'latest'

      - name: Install Nushell ${{ steps.versions.outputs.latest }}
        if: steps.versions.outputs.drift == 'yes'
        run: |
          curl -sL https://github.com/nushell/nushell/releases/download/${{ steps.versions.outputs.latest }}/nu-${{ steps.versions.outputs.latest }}-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo install nu-${{ steps.versions.outputs.latest }}-x86_64-unknown-linux-gnu/nu /usr/local/bin/
          nu --version

      - name: Test plugin against latest Nushell
        id: test
        if: steps.versions.outputs.drift == 'yes'
        env:
          NU_PLUGIN_EDN_NU_VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          set -e
          bb register
          bb test
        continue-on-error: true

      - name: Open PR on green
        if: steps.versions.outputs.drift == 'yes' && steps.test.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.versions.outputs.current }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          BRANCH="bot/nushell-${LATEST}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # Bump nushell-target to the latest. Set plugin-release to
          # the new version with a -SNAPSHOT suffix so a human still
          # has to drop SNAPSHOT and tag explicitly to ship.
          sed -i "s|\"NU_PLUGIN_EDN_NU_VERSION\") \"${CURRENT}\"|\"NU_PLUGIN_EDN_NU_VERSION\") \"${LATEST}\"|" nu_plugin_edn
          sed -i "s|(def plugin-release \"${CURRENT}\")|(def plugin-release \"${LATEST}-SNAPSHOT\")|" nu_plugin_edn

          git checkout -b "$BRANCH"
          git add nu_plugin_edn
          git commit -m "Bump Nushell anchor to ${LATEST} (auto-detected drift)

          Tests pass against Nushell ${LATEST}. Plugin-release set to
          ${LATEST}-SNAPSHOT for the dev window — drop the suffix and tag
          v${LATEST} when ready to release.

          Generated by .github/workflows/nushell-drift.yml"
          git push origin "$BRANCH"

          gh pr create \
            --title "Bump Nushell anchor to ${LATEST}" \
            --body "Drift watcher detected Nushell **${LATEST}** (was anchored to **${CURRENT}**) and the integration suite passed against it.

          This PR bumps:
          - \`nushell-target\` (the version sent in Hello) → \`${LATEST}\`
          - \`plugin-release\` (the version shown in :Metadata) → \`${LATEST}-SNAPSHOT\`

          The SNAPSHOT suffix is intentional — it marks this as in-flight code rather than a tagged release. To ship: drop the \`-SNAPSHOT\` suffix, update CHANGELOG, then \`git tag v${LATEST} && git push --tags\`. The \`release\` workflow will build the asset and create the GitHub Release.

          If you noticed something in the diff or the test log that warrants extra review before merging, comment here and skip the auto-merge." \
            --label "nushell-compat"

      - name: Open issue on red
        if: steps.versions.outputs.drift == 'yes' && steps.test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.versions.outputs.current }}
          LATEST: ${{ steps.versions.outputs.latest }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "Nushell ${LATEST} compat broken" \
            --body "Drift watcher detected Nushell **${LATEST}** (was anchored to **${CURRENT}**) but the integration suite **failed** against it.

          This usually means one of:
          - The plugin protocol's wire shape changed in this Nushell release.
          - A behaviour change in Nushell broke an integration test.
          - A new Nushell command introduced a name collision.

          Check the failing run for details: ${RUN_URL}

          Once diagnosed and fixed, manually merge the bump (or re-run this workflow after pushing the fix)." \
            --label "nushell-compat"
